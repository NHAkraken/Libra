<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library Management System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        /* ==================== COMMON STYLES ==================== */
        .screen { display: none; }
        .screen.active { display: block; }

        .btn {
            padding: 12px 25px;
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
            border: none;
            cursor: pointer;
        }

        .btn-primary { background: linear-gradient(135deg, #2196F3, #1976D2); }
        .btn-success { background: linear-gradient(135deg, #4CAF50, #45a049); }
        .btn-danger { background: linear-gradient(135deg, #f44336, #d32f2f); }
        .btn-warning { background: linear-gradient(135deg, #FF9800, #F57C00); }
        .btn-outline { background: transparent; border: 2px solid #667eea; color: #667eea; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .btn-sm { padding: 8px 15px; font-size: 13px; }

        /* ==================== LOGIN SCREEN ==================== */
        #loginScreen {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .login-box {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 50px 40px;
            width: 100%;
            max-width: 450px;
            animation: slideUp 0.6s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .icon-wrapper {
            width: 100px;
            height: 100px;
            margin: 0 auto 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(102, 126, 234, 0.7); }
            50% { transform: scale(1.05); box-shadow: 0 0 0 20px rgba(102, 126, 234, 0); }
        }

        .icon-wrapper i { font-size: 50px; color: white; }

        .login-header h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .login-header p { color: #666; font-size: 16px; }

        .alert {
            padding: 15px 20px;
            border-radius: 10px;
            margin-bottom: 25px;
            display: none;
        }

        .alert.show {
            display: flex;
            align-items: center;
            gap: 10px;
            animation: shake 0.5s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .alert-danger { background: #ffe8e8; border-left: 4px solid #f44336; color: #d32f2f; }

        .form-group { margin-bottom: 25px; }

        .form-group label {
            display: block;
            margin-bottom: 10px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }

        .input-wrapper { position: relative; }

        .input-wrapper input {
            width: 100%;
            padding: 15px 20px 15px 50px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 15px;
            transition: all 0.3s;
            background: #f8f9fa;
        }

        .input-wrapper input:focus {
            outline: none;
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }

        .input-icon {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
            font-size: 18px;
        }

        .toggle-password {
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #999;
            font-size: 18px;
        }

        .login-info {
            margin-top: 25px;
            text-align: center;
            padding: 20px;
            background: linear-gradient(135deg, #e3f2fd 0%, #f3e5f5 100%);
            border-radius: 10px;
            border-left: 4px solid #667eea;
        }

        .login-info strong { color: #667eea; }

        /* ==================== DASHBOARD SCREEN ==================== */
        #dashboardScreen { padding: 20px; }
        .container { max-width: 1400px; margin: auto; }

        .header {
            background: white;
            padding: 25px 35px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.15);
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            color: #333;
            font-size: 32px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header h1 i { color: #667eea; }

        .header-actions { display: flex; gap: 12px; align-items: center; }

        .success {
            background: linear-gradient(135deg, #4CAF50, #45a049);
            color: white;
            padding: 18px 25px;
            border-radius: 12px;
            margin-bottom: 25px;
            display: none;
            align-items: center;
            gap: 15px;
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(76, 175, 80, 0.3);
            animation: slideDown 0.5s;
        }

        .success.show { display: flex; }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            gap: 20px;
            transition: transform 0.3s;
        }

        .stat-card:hover { transform: translateY(-5px); }

        .stat-icon {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            color: white;
        }

        .stat-icon.green { background: linear-gradient(135deg, #4CAF50, #45a049); }
        .stat-icon.blue { background: linear-gradient(135deg, #2196F3, #1976D2); }
        .stat-icon.orange { background: linear-gradient(135deg, #FF9800, #F57C00); }

        .stat-info h3 { font-size: 36px; color: #333; margin-bottom: 5px; }
        .stat-info p { color: #666; font-size: 15px; }

        /* Tabs */
        .tabs {
            background: white;
            padding: 10px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            margin-bottom: 25px;
            display: flex;
            gap: 10px;
        }

        .tab-btn {
            flex: 1;
            padding: 15px;
            background: transparent;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            color: #666;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .tab-btn:hover:not(.active) { background: #f0f0f0; }

        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.4s; }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Books Grid */
        .books-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }

        .book-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            transition: all 0.3s;
        }

        .book-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .book-card img { width: 100%; height: 350px; object-fit: cover; }

        .book-card-body { padding: 20px; }

        .book-title {
            font-size: 18px;
            font-weight: 700;
            color: #333;
            margin-bottom: 8px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .book-author { color: #666; font-size: 14px; margin-bottom: 12px; }

        .book-meta {
            display: flex;
            gap: 15px;
            margin: 10px 0;
            font-size: 13px;
            color: #777;
        }

        .book-category {
            display: inline-block;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 12px;
            font-weight: 600;
        }

        .book-status {
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            margin: 10px 0;
            display: inline-block;
        }

        .available { background: #e8f5e9; color: #2e7d32; }
        .unavailable { background: #ffebee; color: #c62828; }

        .book-actions { display: flex; gap: 8px; margin-top: 15px; }
        .book-actions .btn { flex: 1; }

        /* Table */
        .table-container {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        table { width: 100%; border-collapse: collapse; }

        th {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 18px;
            text-align: left;
            font-weight: 600;
        }

        td { padding: 15px; border-bottom: 1px solid #f0f0f0; }
        tr:hover { background: #f8f9fa; }

        .book-thumb {
            width: 70px;
            height: 90px;
            object-fit: cover;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        /* Borrowed Items */
        .borrowed-item {
            background: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 15px;
            display: grid;
            grid-template-columns: auto 1fr auto;
            gap: 20px;
            align-items: center;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
            transition: all 0.3s;
        }

        .borrowed-item:hover {
            box-shadow: 0 5px 15px rgba(0,0,0,0.15);
            transform: translateX(5px);
        }

        .borrowed-img { width: 80px; height: 110px; object-fit: cover; border-radius: 8px; }

        .borrowed-details h4 { color: #333; margin-bottom: 8px; font-size: 18px; }
        .borrowed-details p { color: #666; margin: 5px 0; font-size: 14px; }
        .overdue { color: #f44336; font-weight: 700; }

        /* Empty State */
        .empty-state { text-align: center; padding: 60px 20px; color: #999; }
        .empty-state i { font-size: 80px; margin-bottom: 20px; opacity: 0.3; }
        .empty-state h3 { font-size: 24px; margin-bottom: 10px; }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(5px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active { display: flex; }

        .modal-content {
            background: white;
            border-radius: 15px;
            width: 90%;
            max-width: 600px;
            max-height: 90vh;
            overflow-y: auto;
            padding: 30px;
            animation: slideUp 0.3s;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .modal-header h2 { color: #333; font-size: 24px; }

        .close-modal {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: #999;
        }

        .close-modal:hover { color: #f44336; }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 15px;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-group textarea { resize: vertical; min-height: 100px; }

        .modal-actions {
            display: flex;
            gap: 12px;
            margin-top: 25px;
            justify-content: flex-end;
        }

        /* Image Upload */
        .image-upload-section {
            text-align: center;
            padding: 30px;
            background: linear-gradient(135deg, #f5f7fa, #c3cfe2);
            border-radius: 12px;
            margin-bottom: 30px;
        }

        .image-preview {
            width: 200px;
            height: 280px;
            object-fit: cover;
            border-radius: 10px;
            border: 3px dashed #667eea;
            margin-bottom: 15px;
        }

        .file-input-label {
            display: inline-block;
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }

        input[type="file"] { display: none; }

        /* Responsive */
        @media (max-width: 768px) {
            .header { flex-direction: column; gap: 15px; }
            .header-actions { flex-direction: column; width: 100%; }
            .stats-grid { grid-template-columns: 1fr; }
            .books-grid { grid-template-columns: 1fr; }
            .borrowed-item { grid-template-columns: 1fr; }
            .tabs { flex-direction: column; }
            .form-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<!-- ==================== LOGIN SCREEN ==================== -->
<div id="loginScreen" class="screen active">
    <div class="login-box">
        <div class="login-header">
            <div class="icon-wrapper">
                <i class="fas fa-book-reader"></i>
            </div>
            <h1>Library Management</h1>
            <p>Librarian Portal</p>
        </div>
        
        <div class="alert alert-danger" id="errorAlert">
            <i class="fas fa-exclamation-circle"></i>
            <span id="errorMessage"></span>
        </div>
        
        <form id="loginForm">
            <div class="form-group">
                <label for="username">
                    <i class="fas fa-user"></i> Username
                </label>
                <div class="input-wrapper">
                    <input type="text" id="username" placeholder="Enter username" required autofocus>
                    <i class="fas fa-user input-icon"></i>
                </div>
            </div>

            <div class="form-group">
                <label for="password">
                    <i class="fas fa-lock"></i> Password
                </label>
                <div class="input-wrapper">
                    <input type="password" id="password" placeholder="Enter password" required>
                    <i class="fas fa-lock input-icon"></i>
                    <i class="fas fa-eye toggle-password" id="togglePassword"></i>
                </div>
            </div>

            <button type="submit" class="btn btn-primary" style="width:100%;">
                <i class="fas fa-sign-in-alt"></i> Sign In
            </button>

            <div class="login-info">
                <i class="fas fa-info-circle"></i>
                <p>
                    <strong>Demo Credentials</strong><br>
                    Username: <strong>admin</strong> | Password: <strong>admin123</strong>
                </p>
            </div>
        </form>
    </div>
</div>

<!-- ==================== DASHBOARD SCREEN ==================== -->
<div id="dashboardScreen" class="screen">
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1><i class="fas fa-book-reader"></i> Library Dashboard</h1>
            <div class="header-actions">
                <button onclick="showAddBookModal()" class="btn btn-success">
                    <i class="fas fa-plus"></i> Add Book
                </button>
                <span id="userDisplay" style="color:#666; padding:12px;"></span>
                <button onclick="logout()" class="btn btn-danger">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </button>
            </div>
        </div>

        <!-- Success Message -->
        <div class="success" id="successMessage">
            <i class="fas fa-check-circle" style="font-size:24px;"></i>
            <span id="successText"></span>
        </div>

        <!-- Statistics -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon green">
                    <i class="fas fa-book"></i>
                </div>
                <div class="stat-info">
                    <h3 id="totalBooks">0</h3>
                    <p>Total Books</p>
                </div>
            </div>

            <div class="stat-card">
                <div class="stat-icon blue">
                    <i class="fas fa-check-circle"></i>
                </div>
                <div class="stat-info">
                    <h3 id="availableBooks">0</h3>
                    <p>Available</p>
                </div>
            </div>

            <div class="stat-card">
                <div class="stat-icon orange">
                    <i class="fas fa-hand-holding"></i>
                </div>
                <div class="stat-info">
                    <h3 id="borrowedBooks">0</h3>
                    <p>Borrowed</p>
                </div>
            </div>
        </div>

        <!-- Tabs -->
        <div class="tabs">
            <button class="tab-btn active" onclick="openTab('allBooks')">
                <i class="fas fa-book"></i> All Books
            </button>
            <button class="tab-btn" onclick="openTab('borrowedTab')">
                <i class="fas fa-hand-holding"></i> Borrowed Books
            </button>
            <button class="tab-btn" onclick="openTab('manageBooks')">
                <i class="fas fa-cog"></i> Manage Books
            </button>
        </div>

        <!-- Tab 1: All Books -->
        <div id="allBooks" class="tab-content active">
            <div id="booksGrid" class="books-grid"></div>
        </div>

        <!-- Tab 2: Borrowed Books -->
        <div id="borrowedTab" class="tab-content">
            <div id="borrowedList"></div>
        </div>

        <!-- Tab 3: Manage Books -->
        <div id="manageBooks" class="tab-content">
            <div class="table-container">
                <table id="manageTable"></table>
            </div>
        </div>
    </div>
</div>

<!-- ==================== ADD BOOK MODAL ==================== -->
<div id="addBookModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2><i class="fas fa-plus-circle"></i> Add New Book</h2>
            <button class="close-modal" onclick="closeAddBookModal()">&times;</button>
        </div>
        <form id="addBookForm">
            <div class="image-upload-section">
                <img id="imagePreview" 
                     src="https://via.placeholder.com/200x280/667eea/ffffff?text=Upload+Cover" 
                     alt="Preview" 
                     class="image-preview">
                <br>
                <input type="file" id="bookImage" accept="image/*" onchange="previewImage(event)">
                <label for="bookImage" class="file-input-label">
                    <i class="fas fa-cloud-upload-alt"></i> Choose Image
                </label>
                <p id="fileName" style="margin-top:10px; color:#666;"></p>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Book Title *</label>
                    <input type="text" id="title" required>
                </div>
                <div class="form-group">
                    <label>Author *</label>
                    <input type="text" id="author" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>ISBN *</label>
                    <input type="text" id="isbn" required>
                </div>
                <div class="form-group">
                    <label>Category *</label>
                    <select id="category" required>
                        <option value="">Select Category</option>
                        <option value="Fiction">Fiction</option>
                        <option value="Non-Fiction">Non-Fiction</option>
                        <option value="Science">Science</option>
                        <option value="History">History</option>
                        <option value="Technology">Technology</option>
                        <option value="Art">Art</option>
                        <option value="Biography">Biography</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Year</label>
                    <input type="number" id="year" min="1800" max="2024">
                </div>
                <div class="form-group">
                    <label>Quantity *</label>
                    <input type="number" id="quantity" value="1" min="1" required>
                </div>
            </div>

            <div class="form-group">
                <label>Description</label>
                <textarea id="description" rows="4"></textarea>
            </div>

            <div class="modal-actions">
                <button type="button" class="btn btn-outline" onclick="closeAddBookModal()">
                    <i class="fas fa-times"></i> Cancel
                </button>
                <button type="submit" class="btn btn-success">
                    <i class="fas fa-save"></i> Save Book
                </button>
            </div>
        </form>
    </div>
</div>

<!-- ==================== BORROW MODAL ==================== -->
<div id="borrowModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2><i class="fas fa-hand-holding"></i> Borrow Book</h2>
            <button class="close-modal" onclick="closeBorrowModal()">&times;</button>
        </div>
        <form id="borrowForm">
            <div class="form-group">
                <label>Book Title</label>
                <input type="text" id="bookTitleDisplay" readonly style="background:#f0f0f0;">
            </div>
            <div class="form-group">
                <label>Student Name *</label>
                <input type="text" id="studentName" required>
            </div>
            <div class="form-group">
                <label>Student ID *</label>
                <input type="text" id="studentId" required>
            </div>
            <div class="form-group">
                <label>Borrow Date *</label>
                <input type="date" id="borrowDate" required>
            </div>
            <div class="form-group">
                <label>Return Date *</label>
                <input type="date" id="returnDate" required>
            </div>
            <input type="hidden" id="borrowBookId">
            <div class="modal-actions">
                <button type="button" class="btn btn-danger" onclick="closeBorrowModal()">Cancel</button>
                <button type="submit" class="btn btn-success">Confirm Borrow</button>
            </div>
        </form>
    </div>
</div>

<script>
// ==================== INITIALIZATION ====================
if (!localStorage.getItem('users')) {
    localStorage.setItem('users', JSON.stringify([
        { username: 'admin', password: 'admin123', fullName: 'Administrator' }
    ]));
}

if (!localStorage.getItem('books')) {
    localStorage.setItem('books', JSON.stringify([
        {
            id: 1,
            title: 'The Great Gatsby',
            author: 'F. Scott Fitzgerald',
            isbn: '978-0-7432-7356-5',
            category: 'Fiction',
            year: 1925,
            quantity: 5,
            available: 5,
            image: 'https://images-na.ssl-images-amazon.com/images/I/81QuEGw8VPL.jpg',
            description: 'A novel set in the Jazz Age'
        },
        {
            id: 2,
            title: '1984',
            author: 'George Orwell',
            isbn: '978-0-452-28423-4',
            category: 'Fiction',
            year: 1949,
            quantity: 6,
            available: 6,
            image: 'https://m.media-amazon.com/images/I/71kxa1-0mfL._AC_UF1000,1000_QL80_.jpg',
            description: 'Dystopian novel'
        }
    ]));
}

if (!localStorage.getItem('borrowedBooks')) {
    localStorage.setItem('borrowedBooks', JSON.stringify([]));
}

let books = JSON.parse(localStorage.getItem('books')) || [];
let borrowedBooks = JSON.parse(localStorage.getItem('borrowedBooks')) || [];
let imageData = null;

// ==================== LOGIN ====================
const currentUser = sessionStorage.getItem('currentUser');
if (currentUser) {
    showDashboard();
}

document.getElementById('togglePassword').addEventListener('click', function() {
    const passwordInput = document.getElementById('password');
    const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
    passwordInput.setAttribute('type', type);
    this.classList.toggle('fa-eye');
    this.classList.toggle('fa-eye-slash');
});

document.getElementById('loginForm').addEventListener('submit', function(e) {
    e.preventDefault();
    
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const users = JSON.parse(localStorage.getItem('users'));
    const user = users.find(u => u.username === username && u.password === password);
    
    if (user) {
        sessionStorage.setItem('currentUser', JSON.stringify(user));
        showDashboard();
    } else {
        const errorAlert = document.getElementById('errorAlert');
        const errorMessage = document.getElementById('errorMessage');
        errorMessage.textContent = 'Invalid username or password!';
        errorAlert.classList.add('show');
        setTimeout(() => errorAlert.classList.remove('show'), 3000);
    }
});

function showDashboard() {
    const user = JSON.parse(sessionStorage.getItem('currentUser'));
    document.getElementById('userDisplay').textContent = '👤 ' + user.fullName;
    document.getElementById('loginScreen').classList.remove('active');
    document.getElementById('dashboardScreen').classList.add('active');
    updateStats();
    renderBooks();
}

function logout() {
    sessionStorage.clear();
    document.getElementById('dashboardScreen').classList.remove('active');
    document.getElementById('loginScreen').classList.add('active');
    document.getElementById('loginForm').reset();
}

// ==================== DASHBOARD FUNCTIONS ====================
function updateStats() {
    const totalBooks = books.length;
    const availableBooks = books.reduce((sum, book) => sum + book.available, 0);
    const borrowed = borrowedBooks.filter(b => b.status === 'borrowed').length;

    document.getElementById('totalBooks').textContent = totalBooks;
    document.getElementById('availableBooks').textContent = availableBooks;
    document.getElementById('borrowedBooks').textContent = borrowed;
}

function openTab(tabName) {
    const tabs = document.querySelectorAll('.tab-content');
    const btns = document.querySelectorAll('.tab-btn');
    
    tabs.forEach(tab => tab.classList.remove('active'));
    btns.forEach(btn => btn.classList.remove('active'));
    
    document.getElementById(tabName).classList.add('active');
    event.target.classList.add('active');

    if (tabName === 'allBooks') renderBooks();
    else if (tabName === 'borrowedTab') renderBorrowedBooks();
    else if (tabName === 'manageBooks') renderManageBooks();
}

function renderBooks() {
    const grid = document.getElementById('booksGrid');
    
    if (books.length === 0) {
        grid.innerHTML = `
            <div class="empty-state" style="grid-column: 1/-1;">
                <i class="fas fa-book"></i>
                <h3>No Books Yet</h3>
                <p>Add your first book to get started</p>
            </div>
        `;
        return;
    }

    grid.innerHTML = books.map(book => `
        <div class="book-card">
            <img src="${book.image}" alt="${book.title}" onerror="this.src='https://via.placeholder.com/280x350/667eea/ffffff?text=No+Image'">
            <div class="book-card-body">
                <div class="book-title">${book.title}</div>
                <div class="book-author">by ${book.author}</div>
                <div class="book-meta">
                    <span><i class="fas fa-barcode"></i> ${book.isbn}</span>
                </div>
                <span class="book-category">${book.category}</span>
                <div class="book-status ${book.available > 0 ? 'available' : 'unavailable'}">
                    ${book.available} / ${book.quantity} Available
                </div>
                <div class="book-actions">
                    ${book.available > 0 ? `
                        <button class="btn btn-success btn-sm" onclick="openBorrowModal(${book.id}, '${book.title.replace(/'/g, "\\'")}')">
                            <i class="fas fa-hand-holding"></i> Borrow
                        </button>
                    ` : ''}
                    <button class="btn btn-danger btn-sm" onclick="deleteBook(${book.id})">
                        <i class="fas fa-trash"></i>
                    </button>
                </div>
            </div>
        </div>
    `).join('');
}

function renderBorrowedBooks() {
    const container = document.getElementById('borrowedList');
    const activeBorrowed = borrowedBooks.filter(b => b.status === 'borrowed');

    if (activeBorrowed.length === 0) {
        container.innerHTML = `
            <div class="empty-state">
                <i class="fas fa-hand-holding"></i>
                <h3>No Borrowed Books</h3>
            </div>
        `;
        return;
    }

    container.innerHTML = activeBorrowed.map(borrow => {
        const book = books.find(b => b.id === borrow.bookId);
        if (!book) return '';
        const isOverdue = new Date(borrow.returnDate) < new Date();
        
        return `
            <div class="borrowed-item">
                <img src="${book.image}" class="borrowed-img" onerror="this.src='https://via.placeholder.com/80x110'">
                <div class="borrowed-details">
                    <h4>${book.title}</h4>
                    <p><strong>Student:</strong> ${borrow.studentName}</p>
                    <p><strong>Student ID:</strong> ${borrow.studentId}</p>
                    <p><strong>Borrowed:</strong> ${borrow.borrowDate}</p>
                    <p class="${isOverdue ? 'overdue' : ''}">
                        <strong>Return by:</strong> ${borrow.returnDate}
                        ${isOverdue ? '⚠️ OVERDUE' : ''}
                    </p>
                </div>
                <button class="btn btn-success" onclick="returnBook(${borrow.id})">
                    <i class="fas fa-check"></i> Return
                </button>
            </div>
        `;
    }).join('');
}

function renderManageBooks() {
    const table = document.getElementById('manageTable');
    
    if (books.length === 0) {
        table.innerHTML = '<tr><td colspan="8" style="text-align:center; padding:40px;">No books</td></tr>';
        return;
    }

    table.innerHTML = `
        <tr>
            <th>Image</th><th>Title</th><th>Author</th><th>ISBN</th>
            <th>Category</th><th>Quantity</th><th>Available</th><th>Actions</th>
        </tr>
        ${books.map(book => `
            <tr>
                <td><img src="${book.image}" class="book-thumb" onerror="this.src='https://via.placeholder.com/70x90'"></td>
                <td><strong>${book.title}</strong></td>
                <td>${book.author}</td>
                <td>${book.isbn}</td>
                <td>${book.category}</td>
                <td>${book.quantity}</td>
                <td><span class="book-status ${book.available > 0 ? 'available' : 'unavailable'}">${book.available}</span></td>
                <td>
                    <button onclick="deleteBook(${book.id})" class="btn btn-danger btn-sm">
                        <i class="fas fa-trash"></i>
                    </button>
                </td>
            </tr>
        `).join('')}
    `;
}

// ==================== ADD BOOK ====================
function showAddBookModal() {
    document.getElementById('addBookModal').classList.add('active');
}

function closeAddBookModal() {
    document.getElementById('addBookModal').classList.remove('active');
    document.getElementById('addBookForm').reset();
    document.getElementById('imagePreview').src = 'https://via.placeholder.com/200x280/667eea/ffffff?text=Upload+Cover';
    imageData = null;
}

function previewImage(event) {
    const file = event.target.files[0];
    if (file) {
        const reader = new FileReader();
        reader.onload = function(e) {
            document.getElementById('imagePreview').src = e.target.result;
            imageData = e.target.result;
            document.getElementById('fileName').textContent = file.name;
        };
        reader.readAsDataURL(file);
    }
}

document.getElementById('addBookForm').addEventListener('submit', function(e) {
    e.preventDefault();

    const newBook = {
        id: Date.now(),
        title: document.getElementById('title').value,
        author: document.getElementById('author').value,
        isbn: document.getElementById('isbn').value,
        category: document.getElementById('category').value,
        year: document.getElementById('year').value || null,
        quantity: parseInt(document.getElementById('quantity').value),
        available: parseInt(document.getElementById('quantity').value),
        image: imageData || 'https://via.placeholder.com/280x350/667eea/ffffff?text=' + encodeURIComponent(document.getElementById('title').value),
        description: document.getElementById('description').value
    };

    books.push(newBook);
    localStorage.setItem('books', JSON.stringify(books));
    closeAddBookModal();
    updateStats();
    renderBooks();
    showSuccess('Book added successfully!');
});

// ==================== BORROW BOOK ====================
function openBorrowModal(bookId, bookTitle) {
    document.getElementById('borrowBookId').value = bookId;
    document.getElementById('bookTitleDisplay').value = bookTitle;
    
    const today = new Date().toISOString().split('T')[0];
    const returnDate = new Date();
    returnDate.setDate(returnDate.getDate() + 14);
    
    document.getElementById('borrowDate').value = today;
    document.getElementById('returnDate').value = returnDate.toISOString().split('T')[0];
    document.getElementById('borrowModal').classList.add('active');
}

function closeBorrowModal() {
    document.getElementById('borrowModal').classList.remove('active');
    document.getElementById('borrowForm').reset();
}

document.getElementById('borrowForm').addEventListener('submit', function(e) {
    e.preventDefault();
    
    const bookId = parseInt(document.getElementById('borrowBookId').value);
    const book = books.find(b => b.id === bookId);
    
    if (book && book.available > 0) {
        book.available--;

        borrowedBooks.push({
            id: Date.now(),
            bookId: bookId,
            studentName: document.getElementById('studentName').value,
            studentId: document.getElementById('studentId').value,
            borrowDate: document.getElementById('borrowDate').value,
            returnDate: document.getElementById('returnDate').value,
            status: 'borrowed'
        });
        
        localStorage.setItem('books', JSON.stringify(books));
        localStorage.setItem('borrowedBooks', JSON.stringify(borrowedBooks));

        closeBorrowModal();
        updateStats();
        renderBooks();
        showSuccess('Book borrowed successfully!');
    }
});

// ==================== RETURN BOOK ====================
function returnBook(borrowId) {
    if (!confirm('Mark this book as returned?')) return;

    const borrow = borrowedBooks.find(b => b.id === borrowId);
    if (borrow) {
        borrow.status = 'returned';
        const book = books.find(b => b.id === borrow.bookId);
        if (book) book.available++;

        localStorage.setItem('books', JSON.stringify(books));
        localStorage.setItem('borrowedBooks', JSON.stringify(borrowedBooks));

        updateStats();
        renderBorrowedBooks();
        showSuccess('Book returned successfully!');
    }
}

// ==================== DELETE BOOK ====================
function deleteBook(bookId) {
    if (!confirm('⚠️ Delete this book?')) return;

    books = books.filter(b => b.id !== bookId);
    localStorage.setItem('books', JSON.stringify(books));

    updateStats();
    renderBooks();
    showSuccess('Book deleted successfully!');
}

// ==================== UTILITIES ====================
function showSuccess(message) {
    document.getElementById('successText').textContent = message;
    document.getElementById('successMessage').classList.add('show');
    setTimeout(() => {
        document.getElementById('successMessage').classList.remove('show');
    }, 3000);
}
</script>

</body>
</html>
